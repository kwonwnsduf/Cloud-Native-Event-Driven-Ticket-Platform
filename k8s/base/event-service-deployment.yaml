apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: ticket-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
        - name: event-service
          image: kwonjunyeol/event-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8082

          envFrom:
            - configMapRef:
                name: ticket-platform-config
            - secretRef:
                name: ticket-platform-secret