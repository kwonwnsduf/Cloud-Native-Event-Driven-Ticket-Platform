apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ticket-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: kwonjunyeol/user-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: ticket-platform-config
            - secretRef:
                name: ticket-platform-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
              httpGet:
                path: /actuator/health/liveness
                port: 8081
              initialDelaySeconds: 40
              periodSeconds: 15
              timeoutSeconds: 3
              failureThreshold: 3
              #trigger cd