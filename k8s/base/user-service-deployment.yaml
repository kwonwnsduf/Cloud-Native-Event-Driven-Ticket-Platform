apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ticket-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: kwonjunyeol/user-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ticket-platform-config
            - secretRef:
                name: ticket-platform-secret