apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: ticket-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
    spec:
      containers:
        - name: reservation-service
          image: kwonjunyeol/reservation-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8087

          envFrom:
            - configMapRef:
                name: ticket-platform-config
            - secretRef:
                name: ticket-platform-secret