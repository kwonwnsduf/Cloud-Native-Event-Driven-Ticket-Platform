apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: event-service
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: event-service
  namespaceSelector:
    matchNames:
      - ticket-dev
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s