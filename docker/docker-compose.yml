version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: ticket-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql
    networks:
      - ticket-net

  redis:
    image: redis:7
    container_name: ticket-redis
    ports:
      - "6379:6379"
    networks:
      - ticket-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ticket-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ticket-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ticket-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ticket-net

  user-service:
    build:
      context: ../services/user-service
    container_name: user-service
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
    ports:
      - "8081:8081"
    networks:
      - ticket-net

  event-service:
    build:
      context: ../services/event-service
    container_name: event-service
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
    ports:
      - "8082:8082"
    networks:
      - ticket-net

  reservation-service:
    build:
      context: ../services/reservation-service
    container_name: reservation-service
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8087:8087"
    networks:
      - ticket-net

  payment-service:
    build:
      context: ../services/payment-service
    container_name: payment-service
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8089:8089"
    networks:
      - ticket-net

  notification-service:
    build:
      context: ../services/notification-service
    container_name: notification-service
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8088:8088"
    networks:
      - ticket-net

volumes:
  postgres_data:

networks:
  ticket-net:
    driver: bridge