name: CD - user-service

on:
  push:
    branches: [ main ]
    paths:
      - 'services/user-service/**'
      - 'k8s/**'
      - '.github/workflows/cd-user-service.yml'

env:
  SERVICE_NAME: user-service
  CONTAINER_NAME: user-service
  IMAGE_NAME: kwonjunyeol/user-service
  NAMESPACE: ticket-dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/user-service

    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew clean test

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Set short sha
        id: vars
        shell: bash
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker images
        run: |
          docker build -t $IMAGE_NAME:latest .
          docker build -t $IMAGE_NAME:dev-${{ steps.vars.outputs.short_sha }} .

      - name: Push Docker images
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:dev-${{ steps.vars.outputs.short_sha }}

  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Deploy new image
        run: |
          export KUBECONFIG=$HOME/.kube/config
          kubectl set image deployment/$SERVICE_NAME $CONTAINER_NAME=$IMAGE_NAME:dev-${{ needs.build-and-push.outputs.short_sha }} -n $NAMESPACE
          kubectl rollout status deployment/$SERVICE_NAME -n $NAMESPACE --timeout=180s

      - name: Rollback on failure
        if: failure()
        run: |
          export KUBECONFIG=$HOME/.kube/config
          kubectl rollout undo deployment/$SERVICE_NAME -n $NAMESPACE
          kubectl rollout status deployment/$SERVICE_NAME -n $NAMESPACE --timeout=180s