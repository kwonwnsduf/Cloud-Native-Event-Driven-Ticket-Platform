name: CD - user-service

on:
  push:
    branches: [ main ]
    paths:
      - 'services/user-service/**'
      - 'k8s/**'
      - '.github/workflows/cd-user-service.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SERVICE_NAME: user-service
      CONTAINER_NAME: user-service
      IMAGE_NAME: kwonjunyeol/user-service
      NAMESPACE: ticket-dev

    defaults:
      run:
        working-directory: services/user-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew clean test

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Set short sha
        shell: bash
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker images
        run: |
          docker build -t $IMAGE_NAME:latest .
          docker build -t $IMAGE_NAME:dev-$SHORT_SHA .

      - name: Push Docker images
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:dev-$SHORT_SHA

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            sudo kubectl set image deployment/$SERVICE_NAME $CONTAINER_NAME=$IMAGE_NAME:dev-$SHORT_SHA -n $NAMESPACE
            sudo kubectl rollout status deployment/$SERVICE_NAME -n $NAMESPACE --timeout=180s

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo kubectl rollout undo deployment/$SERVICE_NAME -n $NAMESPACE
            sudo kubectl rollout status deployment/$SERVICE_NAME -n $NAMESPACE --timeout=180s